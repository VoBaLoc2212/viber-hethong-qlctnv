version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:17-alpine
    container_name: budget_postgres_prod
    environment:
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: budget_qlctnv
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_qlctnv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js App Router (src runtime)
  web:
    container_name: budget_web_prod
    image: ${WEB_IMAGE:-ghcr.io/hoangbinh1245/viber-hethong-qlctnv:latest}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: warn
      NEXT_PUBLIC_API_URL: https://$${DOMAIN}/api
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SENDER_EMAIL: ${SENDER_EMAIL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RECURRING_SCHEDULER_ENABLED: ${RECURRING_SCHEDULER_ENABLED:-true}
      RECURRING_SCHEDULER_INTERVAL_MS: ${RECURRING_SCHEDULER_INTERVAL_MS:-60000}
      TRANSACTION_ATTACHMENT_MAX_FILE_SIZE_BYTES: ${TRANSACTION_ATTACHMENT_MAX_FILE_SIZE_BYTES:-10485760}
      TRANSACTION_ATTACHMENT_ALLOWED_MIME_TYPES: ${TRANSACTION_ATTACHMENT_ALLOWED_MIME_TYPES:-application/pdf,image/jpeg,image/png,image/webp}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: budget_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl_certificates:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  postgres_backups:
    driver: local

networks:
  budget_network:
    driver: bridge

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: budget_postgres
    environment:
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_password
      POSTGRES_DB: budget_qlctnv
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_qlctnv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_network

  # Next.js App Router (src runtime)
  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: budget_web
    environment:
      DATABASE_URL: postgresql://budget_user:budget_password@postgres:5432/budget_qlctnv
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NODE_ENV: development
      LOG_LEVEL: info
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SENDER_EMAIL: ${SENDER_EMAIL:-noreply@company.com}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RECURRING_SCHEDULER_ENABLED: ${RECURRING_SCHEDULER_ENABLED:-true}
      RECURRING_SCHEDULER_INTERVAL_MS: ${RECURRING_SCHEDULER_INTERVAL_MS:-60000}
      TRANSACTION_ATTACHMENT_MAX_FILE_SIZE_BYTES: ${TRANSACTION_ATTACHMENT_MAX_FILE_SIZE_BYTES:-10485760}
      TRANSACTION_ATTACHMENT_ALLOWED_MIME_TYPES: ${TRANSACTION_ATTACHMENT_ALLOWED_MIME_TYPES:-application/pdf,image/jpeg,image/png,image/webp}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - budget_network
    command: npm run dev

  # pgAdmin for Database Management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: budget_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - budget_network

volumes:
  postgres_data:
    driver: local

networks:
  budget_network:
    driver: bridge

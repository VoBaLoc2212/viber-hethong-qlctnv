version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:17-alpine
    container_name: budget_postgres_prod
    environment:
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: budget_qlctnv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_qlctnv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API Server (Production)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        NODE_ENV: production
    container_name: budget_backend_prod
    image: budget-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: warn
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SENDER_EMAIL: ${SENDER_EMAIL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend App (Production - with Nginx reverse proxy)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: budget_frontend_prod
    image: budget-frontend:latest
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: budget_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl_certificates:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - budget_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  postgres_backups:
    driver: local

networks:
  budget_network:
    driver: bridge

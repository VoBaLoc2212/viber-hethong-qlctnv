packages:
  "recharts": "For rendering beautiful dashboard charts (bar, line)"
  "framer-motion": "For fluid layout animations and page transitions"
  "date-fns": "For formatting and manipulating transaction dates"
  "react-hook-form": "For robust form state management in modals"
  "@hookform/resolvers": "For Zod validation integration with react-hook-form"

images:
  - path: "apps/frontend/public/images/auth-bg.png"
    description: "Subtle abstract geometric waves in deep enterprise blues and slate grays, minimal and clean"
    aspect_ratio: "16:9"
  - path: "apps/frontend/public/images/empty-state.png"
    description: "3d illustration of a clean white folder or safe with a subtle blue glow, representing no data found"
    aspect_ratio: "1:1"

notes:
  - Assumes all standard shadcn/ui components are available in src/components/ui/
  - API hooks are imported from @workspace/api-client-react
  - React Query v5 syntax used for caching and invalidations

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: budget_user
          POSTGRES_PASSWORD: budget_password
          POSTGRES_DB: budget_qlctnv_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        env:
          DATABASE_URL: postgresql://budget_user:budget_password@localhost:5433/budget_qlctnv_test
        run: npm run test --if-present

      - name: Build Next.js app
        run: npm run build

  security-scan:
    needs: lint-and-test
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner (container)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aquasec/trivy:0.65.0 \
            fs --format sarif --output trivy-results.sarif .

      - name: Upload Trivy results to GitHub Security tab
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

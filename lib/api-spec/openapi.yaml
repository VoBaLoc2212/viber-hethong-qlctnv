openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Budget & Transaction Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction operations
  - name: departments
    description: Department operations
  - name: dashboard
    description: Dashboard KPI operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: type
          in: query
          schema:
            type: string
            enum: [INCOME, EXPENSE]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
        - name: departmentId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    patch:
      operationId: updateTransactionStatus
      tags: [transactions]
      summary: Update transaction status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionStatusRequest"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /departments:
    get:
      operationId: getDepartments
      tags: [departments]
      summary: List departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get dashboard KPI metrics
      responses:
        "200":
          description: KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/expenses-by-month:
    get:
      operationId: getExpensesByMonth
      tags: [dashboard]
      summary: Get monthly expenses for bar chart
      responses:
        "200":
          description: Monthly expenses data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyExpense"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        transactionCode:
          type: string
        type:
          type: string
          enum: [INCOME, EXPENSE]
        amount:
          type: number
        categoryId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        departmentName:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - transactionCode
        - type
        - amount
        - date
        - status
        - createdAt

    TransactionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    CreateTransactionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [INCOME, EXPENSE]
        amount:
          type: number
        description:
          type: string
          nullable: true
        departmentId:
          type: integer
          nullable: true
        categoryId:
          type: integer
          nullable: true
        date:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          default: PENDING
      required:
        - type
        - amount
        - date

    UpdateTransactionStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
      required:
        - status

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        budgetAllocated:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - code
        - budgetAllocated
        - createdAt

    CreateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        budgetAllocated:
          type: number
      required:
        - name
        - code
        - budgetAllocated

    DashboardKpis:
      type: object
      properties:
        totalBudget:
          type: number
        totalSpent:
          type: number
        remainingBalance:
          type: number
        totalIncome:
          type: number
        transactionCount:
          type: integer
        pendingCount:
          type: integer
      required:
        - totalBudget
        - totalSpent
        - remainingBalance
        - totalIncome
        - transactionCount
        - pendingCount

    MonthlyExpense:
      type: object
      properties:
        month:
          type: string
        expenses:
          type: number
        income:
          type: number
      required:
        - month
        - expenses
        - income
